on:
  push:
    branches: [main, master]
  workflow_dispatch:

name: Build and deploy wasm R package repository

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v4

      - name: Pull webR Docker image
        run: docker pull ghcr.io/r-wasm/webr:main

      - name: Write R build script
        run: |
          cat > /tmp/build.R << 'REOF'
          message("=== Installing pak + rwasm ===")
          install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")
          pak::pak("r-wasm/rwasm")
          library(rwasm)

          bioc_base <- "https://bioconductor.org/packages/3.22/bioc"

          message("=== Fetching Bioconductor 3.22 package index ===")
          bioc_pkgs <- available.packages(
            repos     = bioc_base,
            type      = "source",
            fields    = "Version"
          )
          message("Found ", nrow(bioc_pkgs), " packages in Bioconductor 3.22")

          pkgs_wanted <- c("edgeR")

          for (pkg in pkgs_wanted) {
            if (!pkg %in% rownames(bioc_pkgs)) {
              message("NOT FOUND: ", pkg)
              next
            }
            ver <- bioc_pkgs[pkg, "Version"]
            url <- paste0(bioc_base, "/src/contrib/", pkg, "_", ver, ".tar.gz")
            message("\n=== Building: ", pkg, " ", ver, " ===")
            message("URL: ", url)
            tryCatch(
              rwasm::add_pkg(
                paste0("url::", url),
                repo_dir     = "/output",
                dependencies = FALSE
              ),
              error = function(e) message("FAILED: ", pkg, " - ", conditionMessage(e))
            )
          }

          message("\n=== Done. Files in /output: ===")
          built <- list.files("/output", recursive = TRUE, pattern = "\\.tgz$")
          if (length(built) == 0) message("(none)") else cat(paste(built, collapse="\n"), "\n")
          REOF
          echo "Script written OK"

      - name: Create output directory
        run: |
          mkdir -p /tmp/wasm-output
          chmod 777 /tmp/wasm-output

      - name: Run Docker build
        run: |
          docker run --rm \
            --volume /tmp/build.R:/build.R:ro \
            --volume /tmp/wasm-output:/output \
            ghcr.io/r-wasm/webr:main \
            Rscript /build.R

      - name: Check output
        run: |
          echo "=== Files built ==="
          find /tmp/wasm-output -type f
          echo "=== Total: $(find /tmp/wasm-output -type f | wc -l) files ==="

      - name: Copy output to _site
        run: |
          mkdir -p _site
          cp -r /tmp/wasm-output/. _site/
          echo "Total in _site: $(find _site -type f | wc -l)"

      - name: Create index.html
        run: |
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html><html><head><title>Omics Workshop wasm repo</title></head>
          <body>
          <h2>Omics Workshop — WebAssembly R Package Repository</h2>
          <pre>webr::install("edgeR", repos = c(
            "https://sydney-informatics-hub.github.io/wasm-bioc-repo-omics-workshop/",
            "https://repo.r-wasm.org/"
          ))</pre>
          </body></html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4