on:
  push:
    branches: [main, master]
  workflow_dispatch:

name: Build and deploy wasm R package repository

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v4

      - name: Pull webR Docker image
        run: docker pull ghcr.io/r-wasm/webr:main

      - name: Build wasm R packages
        run: |
          # Create output dir with open permissions so Docker can write to it
          mkdir -p ${{ github.workspace }}/_site
          chmod 777 ${{ github.workspace }}/_site

          # Write the R build script to a file (avoids heredoc quoting issues)
          cat > /tmp/build.R << 'REOF'
          message("=== Installing pak ===")
          install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")

          message("=== Installing rwasm ===")
          pak::pak("r-wasm/rwasm")

          message("=== Installing BiocManager ===")
          install.packages("BiocManager", repos = "https://cloud.r-project.org")

          message("=== Setting repos ===")
          library(rwasm)
          options(repos = c(
            BiocManager::repositories(),
            CRAN = "https://cloud.r-project.org"
          ))
          message("Repos set to: ", paste(getOption("repos"), collapse=", "))

          # Build in strict dependency order, one at a time
          pkgs <- c(
            "BiocGenerics",
            "Biobase",
            "S4Vectors",
            "IRanges",
            "GenomeInfoDb",
            "GenomicRanges",
            "MatrixGenerics",
            "DelayedArray",
            "SummarizedExperiment",
            "BiocParallel",
            "limma",
            "edgeR",
            "DESeq2"
          )

          for (pkg in pkgs) {
            message("\n========== Building: ", pkg, " ==========")
            tryCatch(
              rwasm::add_pkg(pkg, repo_dir = "/output", dependencies = FALSE),
              error = function(e) message("FAILED: ", pkg, " — ", conditionMessage(e))
            )
          }

          # Report what was built
          message("\n=== Built packages ===")
          pkgs_dir <- list.files("/output", recursive = TRUE, pattern = "\\.tgz$")
          message(paste(pkgs_dir, collapse = "\n"))
          REOF

          # Run the script inside the webR container
          docker run --rm \
            -v "${{ github.workspace }}/_site:/output" \
            -v "/tmp/build.R:/build.R" \
            ghcr.io/r-wasm/webr:main \
            Rscript /build.R

      - name: Check output
        run: |
          echo "Contents of _site:"
          find ${{ github.workspace }}/_site -type f | head -50
          echo "---"
          echo "Total files: $(find ${{ github.workspace }}/_site -type f | wc -l)"

      - name: Create index.html (required by GitHub Pages)
        run: |
          cat > ${{ github.workspace }}/_site/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head><title>Omics Workshop wasm R package repo</title></head>
          <body>
          <h2>Omics Workshop — WebAssembly R Package Repository</h2>
          <p>This is a binary R package repository for use with
          <a href="https://docs.r-wasm.org/webr/latest/">webR</a>.</p>
          <p>Install packages with:</p>
          <pre>
          webr::install("edgeR", repos = c(
            "https://sydney-informatics-hub.github.io/wasm-bioc-repo-omics-workshop/",
            "https://repo.r-wasm.org/"
          ))
          </pre>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
